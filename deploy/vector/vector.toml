[sources.nginx_logs]
type = "file"
include = ["/var/log/nginx/access.log"]
read_from = "end"

[transforms.parse_nginx]
type = "remap"
inputs = ["nginx_logs"]
source = '''
  . = parse_json!(.message)
'''

[sinks.clickhouse]
type = "clickhouse"
inputs = ["parse_nginx"]
endpoint = "http://clickhouse:8123"
database = "default"
table = "access_logs"
skip_unknown_fields = true
